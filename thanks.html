<!DOCTYPE html>

<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hvala na poruci</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(0, 0, 0, 0.2);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 30px;
    }

    .btn {
      text-decoration: none;
      background: white;
      color: #2E7D32;
      padding: 12px 25px;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #e8f5e9;
    }

    .checkmark {
      font-size: 60px;
      margin-bottom: 20px;
    }
  </style>

</head>

<body>
  <div class="container">
    <div class="checkmark">✔</div>
    <h1>Hvala!</h1>
    <p>Vaša poruka je uspješno poslana.<br>Javit ćemo vam se u najkraćem mogućem roku.</p>

  </div>
</body>
</html>
