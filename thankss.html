<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>Hvala na poruci</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 50px 40px;
      background: #111827;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: 28px;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #9ca3af;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 26px;
      background: #22c55e;
      color: #022c22;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 500;
      transition: 0.25s ease;
    }

    .btn:hover {
      background: #16a34a;
    }

    .secondary {
      margin-top: 18px;
      font-size: 14px;
      color: #6b7280;
    }

    .secondary a {
      color: #e5e7eb;
      text-decoration: none;
    }

    /* SVG check animation */
    .checkmark {
      width: 80px;
      height: 80px;
      margin: 0 auto;
    }

    .checkmark circle {
      stroke: #22c55e;
      stroke-width: 4;
      fill: none;
      stroke-dasharray: 251;
      stroke-dashoffset: 251;
      animation: draw-circle 0.6s ease-out forwards;
    }

    .checkmark path {
      stroke: #22c55e;
      stroke-width: 4;
      fill: none;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: draw-check 0.4s 0.6s ease-out forwards;
    }

    @keyframes draw-circle {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes draw-check {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <svg class="checkmark" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" />
      <path d="M30 52 L45 65 L70 40" />
    </svg>

    <h1>Poruka poslana</h1>
    <p>Hvala na javljanju. Odgovorit ću vam u najkraćem mogućem roku.</p>

    <a href="/" class="btn">Povratak na početnu</a>

    <div class="secondary">
      ili pogledajte <a href="/projects">moje projekte</a>
    </div>

  </div>
</body>
</html>
